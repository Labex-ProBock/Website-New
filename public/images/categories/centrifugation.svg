  <!-- Large centred silhouette -->
  <path d="M400 110 m-150 0 a150 150 0 1 0 300 0 a150 150 0 1 0-300 0 M400 110 m-90 0 a90 90 0 1 0 180 0 a90 90 0 1 0-180 0 M400 110 m-22 0 a22 22 0 1 0 44 0 a22 22 0 1 0-44 0 M400 110 L400 -40 M400 110 L530 43 M400 110 L530 177 M400 110 L400 260 M400 110 L270 177 M400 110 L270 43" fill="#FFFFFF" opacity="0.22"/>

  <!-- Category name — dominant element -->
  <text x="400" y="468" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" opacity="0.95" text-anchor="middle">Centrifugation</text>

  <!-- Orange divider under name -->
  <line x1="340" y1="484" x2="460" y2="484" stroke="#FF6A1A" stroke-width="2" opacity="0.70"/>

  <!-- Bottom tag -->
  <text x="400" y="554" font-family="monospace, 'Courier New'" font-size="11" letter-spacing="2" fill="#FFFFFF" opacity="0.50" text-anchor="middle">Product photography in progress</text>
</svg>